<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Maestro Workflow Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Maestro - High-performance Laravel workflow orchestration">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #3f51b5;
      --theme-color-light: #5c6bc0;
      --text-color-base: #2c3e50;
      --text-color-secondary: #7f8c8d;
      --text-color-tertiary: #95a5a6;
    }

    .sidebar {
      background-color: #fafafa;
    }

    .sidebar-nav > ul > li > a {
      font-weight: 600;
    }

    .markdown-section h1 {
      color: var(--theme-color);
    }

    .markdown-section code {
      background-color: #f5f5f5;
      padding: 2px 6px;
      border-radius: 3px;
    }

    .markdown-section pre > code {
      padding: 16px;
    }

    .tip {
      background-color: #e8f5e9;
      border-left: 4px solid #4caf50;
      padding: 12px 16px;
      margin: 16px 0;
    }

    .warning {
      background-color: #fff3e0;
      border-left: 4px solid #ff9800;
      padding: 12px 16px;
      margin: 16px 0;
    }

    .danger {
      background-color: #ffebee;
      border-left: 4px solid #f44336;
      padding: 12px 16px;
      margin: 16px 0;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Maestro',
      repo: 'https://github.com/your-org/maestro',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search documentation',
        noData: 'No Results',
        depth: 3,
      },
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied'
      },
      tabs: {
        persist: true,
        sync: true,
        theme: 'classic',
      },
      pagination: {
        previousText: 'Previous',
        nextText: 'Next',
        crossChapter: true,
        crossChapterText: true,
      },
      themeColor: '#3f51b5',
    }
  </script>
  <!-- Docsify core -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Plugins -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-tabs@1"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <!-- Syntax highlighting -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-php.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
